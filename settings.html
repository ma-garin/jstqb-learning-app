<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 - JSTQB-AL学習アプリ</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="img/JSTQB_TA.png" type="image/png">
    <link rel="apple-touch-icon" href="img/JSTQB_TA.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JSTQB-AL学習">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZ9EN5NX5F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-BZ9EN5NX5F');
    </script>
    <nav id="main-nav" class="hidden"></nav>
    <nav id="breadcrumb-nav" class="hidden"></nav>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <button onclick="history.length > 1 ? history.back() : (location.href='index.html')" class="header-back" aria-label="前のページへ戻る" type="button">
                <span class="material-icons">arrow_back_ios</span>
            </button>
            <h1 class="header-title">設定</h1>
        </div>
    </header>

    <main class="app-main" id="app-container">
        <section id="settings-screen" style="padding-bottom: 32px;">

            <!-- 学習データ -->
            <div class="settings-group">
                <p class="settings-group-label">学習データ</p>

                <div class="settings-item">
                    <div class="settings-item-info">
                        <p class="settings-item-title">累計学習データ</p>
                        <p class="settings-item-desc" id="stats-summary">読み込み中…</p>
                    </div>
                </div>

                <button class="settings-btn settings-btn--danger" id="reset-wrong-btn" type="button">
                    <span class="material-icons">playlist_remove</span>
                    苦手問題リストをリセット
                </button>

                <button class="settings-btn settings-btn--danger" id="reset-all-btn" type="button">
                    <span class="material-icons">delete_forever</span>
                    すべての学習データをリセット
                </button>
            </div>

            <!-- AI設定 -->
            <div class="settings-group">
                <p class="settings-group-label">AI問題生成</p>

                <div class="settings-item">
                    <div class="settings-item-info">
                        <p class="settings-item-title">Gemini APIキー</p>
                        <p class="settings-item-desc">Google AI Studio で発行したキーを入力</p>
                    </div>
                </div>

                <div style="display:flex; gap:8px; align-items:center; padding: 0 16px 4px;">
                    <input type="password" id="gemini-key-input" placeholder="AIzaSy..." autocomplete="off"
                        style="flex:1; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius); font-size:0.9em; background:var(--surface-alt,#F8FAFC);">
                    <button id="gemini-key-toggle" type="button"
                        style="background:none; border:none; cursor:pointer; padding:8px; color:var(--text-muted);">
                        <span class="material-icons" id="gemini-key-toggle-icon">visibility</span>
                    </button>
                </div>
                <div style="display:flex; gap:8px; padding: 0 16px 0;">
                    <button class="settings-btn settings-btn--primary" id="gemini-key-save-btn" type="button" style="flex:1;">
                        <span class="material-icons">save</span>
                        保存
                    </button>
                    <button class="settings-btn settings-btn--danger" id="gemini-key-delete-btn" type="button">
                        <span class="material-icons">key_off</span>
                        削除
                    </button>
                </div>
                <p id="gemini-key-status" style="font-size:0.8em; color:var(--text-muted); padding: 4px 16px 0; min-height:1.2em;"></p>
            </div>

            <!-- アプリ情報 -->
            <div class="settings-group">
                <p class="settings-group-label">アプリ情報</p>

                <a href="release_notes.html" class="settings-item settings-item--link">
                    <div class="settings-item-info">
                        <p class="settings-item-title">更新履歴</p>
                        <p class="settings-item-desc">バージョン・変更内容の確認</p>
                    </div>
                    <span class="material-icons settings-item-arrow">chevron_right</span>
                </a>

                <div class="settings-item">
                    <div class="settings-item-info">
                        <p class="settings-item-title">対応シラバス</p>
                        <p class="settings-item-desc">JSTQB CTAL-TA v3.1.1.J03 / CTAL-TM V3.0.J03</p>
                    </div>
                </div>

                <div class="settings-item">
                    <div class="settings-item-info">
                        <p class="settings-item-title">収録問題数</p>
                        <p class="settings-item-desc">ALTA：120問　ALTM：40問　模擬試験：45問</p>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <nav class="bottom-nav" role="navigation" aria-label="メインナビゲーション">
        <a href="index.html" class="bottom-nav-item" id="nav-home">
            <span class="material-icons">home</span>
            <span class="bottom-nav-label">ホーム</span>
        </a>
        <a href="study.html" class="bottom-nav-item" id="nav-quiz">
            <span class="material-icons">edit_note</span>
            <span class="bottom-nav-label">クイズ</span>
        </a>
        <a href="ai-quiz.html" class="bottom-nav-item" id="nav-ai">
            <span class="material-icons">auto_awesome</span>
            <span class="bottom-nav-label">AI問題</span>
        </a>
        <a href="glossary.html" class="bottom-nav-item" id="nav-glossary">
            <span class="material-icons">sort_by_alpha</span>
            <span class="bottom-nav-label">用語集</span>
        </a>
    </nav>

    <script type="module" src="js/settings.js"></script>
</body>
</html>
