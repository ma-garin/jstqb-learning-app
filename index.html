<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSTQB-テストアナリスト 学習アプリ</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="img/JSTQB_TA.png" type="image/png">
    <!-- PWA / Apple Touch Icon の設定 -->
    <link rel="apple-touch-icon" href="img/JSTQB_TA.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JSTQB-TA学習">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZ9EN5NX5F"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-BZ9EN5NX5F');
    </script>
</head>
<body>
    <header>
        <div class="header-content">
            <span class="material-icons menu-icon" id="menu-icon">menu</span>
            <h1>JSTQB-テストアナリスト 学習アプリ</h1>
            <div class="spacer"></div>
        </div>
        <nav id="main-nav" class="hidden">
            <ul>
                <li><button id="nav-start-learning-button">学習を開始する</button></li>
                <li><button id="nav-view-syllabus-button">シラバスを見る</button></li>
                <li><button id="nav-view-assumed-problems-button">想定問題を見る</button></li>
                <li><button id="nav-view-release-notes-button">リリースノートを見る</button></li>
                <li><button id="nav-view-glossary-button">用語集を見る</button></li>
                <li><button id="nav-back-to-welcome-button">TOPに戻る</button></li>
            </ul>
        </nav>
        <nav id="breadcrumb-nav">
            </nav>
    </header>

    <main id="app-container">
        <section id="welcome-screen" class="screen">
            <div class="welcome-dashboard">
                <div class="welcome-overview">
                    <p class="screen-kicker">Advanced Level Test Analyst</p>
                    <h2>テストアナリスト試験対策</h2>
                    <p class="welcome-lead">JSTQB Advanced Level テストアナリストシラバスに沿って、要点確認から問題演習まで進められます。</p>
                    <p class="syllabus-version-note">JSTQB Advanced Level テストアナリストシラバス Version 3.1.1.J03 対応</p>
                    <div class="study-summary" aria-label="学習範囲の概要">
                        <div>
                            <span class="summary-value">6</span>
                            <span class="summary-label">主要章</span>
                        </div>
                        <div>
                            <span class="summary-value">33</span>
                            <span class="summary-label">想定問題</span>
                        </div>
                        <div>
                            <span class="summary-value">K1-K4</span>
                            <span class="summary-label">出題レベル</span>
                        </div>
                    </div>
                </div>
                <div class="button-group" aria-label="主要機能">
                    <button id="start-learning-button" class="primary-action">
                        <span class="material-icons" aria-hidden="true">play_arrow</span>
                        <span>学習を開始する</span>
                    </button>
                    <button id="view-syllabus-button">
                        <span class="material-icons" aria-hidden="true">menu_book</span>
                        <span>シラバスを見る</span>
                    </button>
                    <button id="view-assumed-problems-button">
                        <span class="material-icons" aria-hidden="true">quiz</span>
                        <span>想定問題を見る</span>
                    </button>
                    <button id="view-glossary-button">
                        <span class="material-icons" aria-hidden="true">sort_by_alpha</span>
                        <span>用語集を見る</span>
                    </button>
                    <button id="view-release-notes-button">
                        <span class="material-icons" aria-hidden="true">history</span>
                        <span>リリースノートを見る</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025 JSTQB TA Learning App</p>
    </footer>

    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
