<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ - JSTQB-AL学習アプリ</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="img/JSTQB_TA.png" type="image/png">
    <link rel="apple-touch-icon" href="img/JSTQB_TA.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JSTQB-AL学習">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZ9EN5NX5F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-BZ9EN5NX5F');
    </script>
    <nav id="main-nav" class="hidden"></nav>
    <nav id="breadcrumb-nav" class="hidden"></nav>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <button id="quiz-pause-btn" class="header-back" aria-label="中断して保存" type="button">
                <span class="material-icons">arrow_back_ios</span>
            </button>
            <h1 class="header-title">クイズ</h1>
            <button id="quiz-pause-label-btn" type="button"
                style="background:none;border:none;font-size:0.78em;color:var(--text-muted);cursor:pointer;padding:4px 8px;white-space:nowrap;">
                中断して保存
            </button>
        </div>
    </header>

    <main class="app-main" id="app-container">
        <section id="quiz-screen">

            <!-- Progress bar -->
            <div class="quiz-progress-header">
                <span class="quiz-progress-text">
                    <span id="question-number">1</span> / <span id="total-questions">10</span>
                </span>
                <div class="quiz-progress-track">
                    <div class="quiz-progress-fill" id="quiz-progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Question card -->
            <div id="question-container">
                <div id="question-text-container">
                    <p id="question-text"></p>
                    <div id="question-image-container" class="hidden">
                        <img id="question-image" src="" alt="問題の図">
                    </div>
                </div>

                <div id="options-container">
                    <label class="option-label">
                        <input type="radio" name="answer" value="a">
                        <span class="option-text"></span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="answer" value="b">
                        <span class="option-text"></span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="answer" value="c">
                        <span class="option-text"></span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="answer" value="d">
                        <span class="option-text"></span>
                    </label>
                </div>

                <p id="answer-warning" class="answer-warning hidden" role="alert">解答を選択してください。</p>
                <button id="submit-answer-button" type="button">解答する</button>
            </div>

            <!-- Feedback -->
            <div id="feedback-container" class="hidden">
                <p id="result-message"></p>
                <div id="answer-summary"></div>
                <p id="explanation-text"></p>
                <button id="next-question-button" class="hidden" type="button">次の問題へ</button>
            </div>

        </section>
    </main>

    <nav class="bottom-nav" role="navigation" aria-label="メインナビゲーション">
        <a href="index.html" class="bottom-nav-item" id="nav-home">
            <span class="material-icons">home</span>
            <span class="bottom-nav-label">ホーム</span>
        </a>
        <a href="study.html" class="bottom-nav-item" id="nav-quiz">
            <span class="material-icons">edit_note</span>
            <span class="bottom-nav-label">クイズ</span>
        </a>
        <a href="ai-quiz.html" class="bottom-nav-item" id="nav-ai">
            <span class="material-icons">auto_awesome</span>
            <span class="bottom-nav-label">AI問題</span>
        </a>
        <a href="glossary.html" class="bottom-nav-item" id="nav-glossary">
            <span class="material-icons">sort_by_alpha</span>
            <span class="bottom-nav-label">用語集</span>
        </a>
    </nav>

    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/quiz.js"></script>
</body>
</html>
